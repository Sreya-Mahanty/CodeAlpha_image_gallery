<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Image Gallery</h1>
    <p>WELCOME TO MY IMAGE GALLERY</p>


    <!-- Filter Buttons -->
    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('city')">City</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <!-- Gallery -->
    <div class="gallery">

        <div class="image nature">
            <img src="images/nature1.jpg" alt="">
        </div>

        <div class="image nature">
            <img src="images/nature2.jpg" alt="">
        </div>

         <div class="image nature">
            <img src="images/nature3.jpg" alt="">
        </div>

         <div class="image nature">
            <img src="images/nature4.jpg" alt="">
        </div>

         <div class="image nature">
            <img src="images/nature5.jpg" alt="">
        </div>

         <div class="image nature">
            <img src="images/nature6.jpg" alt="">
        </div>

         <div class="image city">
            <img src="images/city3.jpg" alt="">
        </div>
        <div class="image city">
            <img src="images/city4.jpg" alt="">
        </div>

        <div class="image city">
            <img src="images/city5.jpg" alt="">
        </div>
        
        <div class="image city">
            <img src="images/city6.jpg" alt="">
        </div>

         <div class="image animals">
            <img src="images/animal3.jpg" alt="">
        </div>
        
        <div class="image animals">
            <img src="images/animal4.jpg" alt="">
        </div>

        <div class="image animals">
            <img src="images/animal5.jpg" alt="">
        </div>

         <div class="image animals">
            <img src="images/animal6.jpg" alt="">
        </div>

        <div class="image city">
            <img src="images/kolkata.jpg" alt="">
        </div>

        <div class="image city">
            <img src="images/mumbai.jpg" alt="">
        </div>

        <div class="image animals">
            <img src="images/deer.jpg" alt="">
        </div>

        <div class="image animals">
            <img src="images/panda.jpg" alt="">
        </div>

    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">

        <span class="close">&times;</span>

        <button class="prev">&#10094;</button>

        <img class="lightbox-img" src="" alt="">

        <button class="next">&#10095;</button>

    </div>

    <script src="script.js"></script>

</body>
</html>
